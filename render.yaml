services:
  - type: web
    runtime: static
    name: fintra-frontend
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_APP_NAME
        value: Fintra
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_DEFAULT_CURRENCY
        value: BRL
      - key: VITE_DEFAULT_LOCALE
        value: en-US
